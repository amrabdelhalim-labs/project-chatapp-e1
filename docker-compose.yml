services:
  mongodb:
    image: mongo:7-jammy
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ ping: 1 })'"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    environment:
      NODE_ENV: production
      PORT: 5000
      # The app uses DATABASE_URL (preferred) / MONGODB_URI / MONGODB_URL as a fallback order.
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongodb:27017/mychat}
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}

      # Ensure uploads persist on the host for local dev.
      LOCAL_UPLOADS_DIR: /app/public/uploads
      LOCAL_BASE_URL: /uploads
    volumes:
      # Bind mount to avoid losing `default-picture.jpg` from the image at first run.
      - ./server/public/uploads:/app/public/uploads
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
        PUBLIC_URL: ${PUBLIC_URL:-/}
    ports:
      - "3000:8080"
    depends_on:
      - server

volumes:
  mongo_data:

